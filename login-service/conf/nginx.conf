worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    include /etc/nginx/conf.d/protected-users.map;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    upstream panelexemys_upstream {
        server cont-panelexemys:8052;
    }

    upstream modbus_mw_upstream {
        server cont-modbus-mw-service:8084;
    }

    upstream pve_service_upstream {
        server cont-pve-service:8083;
    }

    upstream router_telef_upstream {
        server cont-router-telef-service:8086;
    }

    upstream scada_citec_upstream {
        server cont-scada-citec-service:8094;
    }

    upstream chatcheto_atendedor_upstream {
        server ${LOGIN_CHATCHETO_ATENDEDOR_HOST}:${LOGIN_CHATCHETO_ATENDEDOR_PORT};
    }

    upstream chatcheto_api_upstream {
        server ${LOGIN_CHATCHETO_API_HOST}:${LOGIN_CHATCHETO_API_PORT};
    }

    upstream chatcheto_geo_upstream {
        server ${LOGIN_CHATCHETO_GEO_HOST}:${LOGIN_CHATCHETO_GEO_PORT};
    }
    upstream chatcheto_dashboard_upstream {
        server ${LOGIN_CHATCHETO_DASHBOARD_HOST}:${LOGIN_CHATCHETO_DASHBOARD_PORT};
    }

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;
        ssl_certificate /etc/nginx/tls/cert.pem;
        ssl_certificate_key /etc/nginx/tls/key.pem;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; frame-ancestors 'none';" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;

        root /usr/share/nginx/html;
        index index.html;

        location = /mode/secure {
            limit_except POST { deny all; }
            add_header Set-Cookie "panelexemys_mode=secure; Path=/; HttpOnly; SameSite=Lax" always;
            return 204;
        }

        location = /mode/protected {
            limit_except POST { deny all; }
            if ($http_x_mode_user = "") { return 403; }
            if ($http_x_mode_pass = "") { return 403; }
            if ($protected_mode_expected_pass = "") { return 403; }
            if ($http_x_mode_pass != $protected_mode_expected_pass) { return 403; }
            add_header Set-Cookie "panelexemys_mode=protected; Path=/; HttpOnly; SameSite=Lax" always;
            return 204;
        }

        location /dash/ {
            proxy_pass http://panelexemys_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_buffering off;
        }

        location = /dash {
            return 302 /dash/;
        }

        location /api/ {
            proxy_pass http://modbus_mw_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_buffering off;
        }

        location /pve/ {
            proxy_pass http://pve_service_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_buffering off;
        }

        location = /pve {
            return 302 /pve/;
        }

        location /router/ {
            proxy_pass http://router_telef_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_buffering off;
        }

        location /scada/ {
            proxy_pass http://scada_citec_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_buffering off;
        }

        location = /scada {
            return 302 /scada/;
        }

        location /chatcheto/ {
            proxy_pass http://chatcheto_atendedor_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_buffering off;
        }

        location = /chatcheto {
            return 302 /chatcheto/;
        }

        location /chatcheto-api/ {
            proxy_pass http://chatcheto_api_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location = /chatcheto-api {
            return 302 /chatcheto-api/;
        }

        location /chatcheto-geo/ {
            proxy_pass http://chatcheto_geo_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location = /chatcheto-geo {
            return 302 /chatcheto-geo/;
        }

        location /chatcheto-dashboard-api/ {
            proxy_pass http://chatcheto_dashboard_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location = /chatcheto-dashboard-api {
            return 302 /chatcheto-dashboard-api/;
        }
        location / {
            try_files $uri $uri/ /index.html;
        }

        error_page 500 502 503 504 /error.html;
        location = /error.html {
            internal;
        }
    }
}

